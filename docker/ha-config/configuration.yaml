# Minimal HA configuration for the Print Bridge validation stack.
#
# After starting the stack with docker compose up -d --build:
#
# 1. Open http://localhost:8123 and finish the onboarding wizard.
#
# 2. Add the HA IMAP integration (built-in):
#    Settings → Integrations → Add → IMAP
#      Server:   localhost
#      Port:     3143            (GreenMail plain IMAP)
#      SSL:      Off
#      Username: test@test.example.com
#      Password: test
#    Advanced mode → disable IMAP-Push (GreenMail does not support IDLE).
#
# 3. Add the Print Bridge integration:
#    Settings → Integrations → Add → Print Bridge
#    The setup wizard auto-discovers CUPS at localhost:631 and shows the
#    GreenMail account as an IMAP pre-fill option.
#      CUPS URL:      http://localhost:631
#      Printer Name:  TestPrinter   (or select from the dropdown)
#      IMAP Account:  test@test.example.com  (pre-fills Allowed Senders)
#
# 4. Open Print Bridge → Configure (options) and verify / update:
#      Allowed Senders:    test@test.example.com
#      IMAP Folder Filter: INBOX          (leave empty to accept all folders)
#      Default Duplex:     Two-sided portrait
#
# 5. Generate a HA long-lived token:
#    http://localhost:8123/profile → Long-Lived Access Tokens → Create Token
#
# 6. Run the validation script:
#    cd docker/
#    HA_TOKEN=<your-token> ./validate.sh

homeassistant:
  name: Print Bridge Validation
  unit_system: metric
  time_zone: Europe/Paris

logger:
  default: warning
  logs:
    custom_components.print_bridge: debug
    homeassistant.components.imap: info
