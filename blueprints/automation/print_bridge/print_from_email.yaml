blueprint:
  name: "Print Bridge — Email to Printer"
  description: >
    Print PDF email attachments with configurable sender filters, subject
    pre-filter, and per-PDF-filename keyword rules for duplex / booklet settings.


    **Requires:**

    - The HA built-in **IMAP** integration configured and pointing at your
      print mailbox.

    - The **Print Bridge** custom integration installed and set up with your
      CUPS server.


    **How it works:**

    Triggers on every `imap_content` event from the selected IMAP account.
    Filters by sender and subject, then — for each PDF attachment — evaluates
    duplex and booklet keywords against the **PDF filename**, not the email
    subject. Calls `print_bridge.process_imap_part` with the computed settings.
    Optionally marks the email as seen.

  domain: automation
  author: rubeecube
  source_url: https://raw.githubusercontent.com/rubeecube/ha-print-bridge/main/blueprints/automation/print_bridge/print_from_email.yaml

  input:

    # ── IMAP account ──────────────────────────────────────────────────────

    imap_entry_id:
      name: IMAP Account
      description: >
        Select the IMAP integration entry to monitor.
        Configure the IMAP integration first (Settings → Integrations → IMAP).
      selector:
        config_entry:
          integration: imap

    # ── Sender filter ─────────────────────────────────────────────────────

    allowed_senders:
      name: Allowed Senders
      description: >
        Comma-separated list of email addresses allowed to trigger printing.
        Leave empty to accept mail from **any** sender.

        Example: `print@example.com, admin@example.com`
      default: ""
      selector:
        text:
          multiline: true

    # ── Subject pre-filter ────────────────────────────────────────────────

    subject_filter:
      name: Subject Must Contain (optional)
      description: >
        Only process emails whose **subject** contains this text
        (case-insensitive). Leave empty to accept all subjects.

        Example: `PRINT`
      default: ""
      selector:
        text:

    # ── IMAP folder filter ────────────────────────────────────────────────

    folder_filter:
      name: IMAP Folder Filter (optional)
      description: >
        Comma-separated IMAP folder names. Only emails arriving in one of these
        folders will trigger a print job. Leave empty to accept all folders.

        Use the exact folder name as configured in your IMAP integration, e.g.
        `INBOX`, `INBOX/Print`, `INBOX.Print` (separator depends on your server).
      default: ""
      selector:
        text:

    # ── Default duplex setting ────────────────────────────────────────────

    default_duplex:
      name: Default Duplex Mode
      description: Applied to all jobs unless overridden by a PDF-filename keyword rule below.
      default: "two-sided-long-edge"
      selector:
        select:
          options:
            - label: "One-sided"
              value: "one-sided"
            - label: "Two-sided — portrait (long edge)"
              value: "two-sided-long-edge"
            - label: "Two-sided — landscape / short edge (for booklets)"
              value: "two-sided-short-edge"

    # ── Keyword rules — duplex override (matched against PDF filename) ─────

    one_sided_filename_keywords:
      name: One-sided Keywords (PDF Filename)
      description: >
        Comma-separated keywords. If the **PDF filename** contains any of
        these (case-insensitive), the job is printed **one-sided**, overriding
        the default.

        Example: `receipt, invoice, ticket, scan`
      default: ""
      selector:
        text:

    two_sided_long_filename_keywords:
      name: Two-sided Portrait Keywords (PDF Filename)
      description: >
        Comma-separated keywords. If the **PDF filename** contains any of
        these (case-insensitive), the job is printed **two-sided long-edge
        (portrait)**.

        Example: `letter, report, contract`
      default: ""
      selector:
        text:

    # ── Booklet rules (matched against PDF filename) ──────────────────────

    booklet_filename_keywords:
      name: Booklet Keywords (PDF Filename)
      description: >
        Comma-separated keywords. If the **PDF filename** contains any of
        these (case-insensitive), pages are reordered for **saddle-stitch
        booklet** printing (two-sided short-edge). Overrides the default
        duplex setting.

        Example: `booklet, programme, livret, bulletin`
      default: ""
      selector:
        text:

    booklet_senders:
      name: Booklet Senders (always booklet)
      description: >
        Comma-separated email addresses. Mail from these senders is **always**
        printed as a booklet, regardless of the PDF filename.

        Example: `liturgie@example.com`
      default: ""
      selector:
        text:

    # ── Post-processing ───────────────────────────────────────────────────

    mark_as_seen:
      name: Mark Email as Seen After Processing
      description: >
        Mark the email as read in the IMAP mailbox after all PDF attachments
        have been sent to the printer.
      default: true
      selector:
        boolean:

# ── Trigger ────────────────────────────────────────────────────────────────

trigger:
  - trigger: event
    event_type: imap_content
    event_data:
      entry_id: !input imap_entry_id

# ── Variables ──────────────────────────────────────────────────────────────
# Top-level variables capture inputs and event shortcuts used in conditions
# and inside the repeat loop.

variables:
  imap_entry_id: !input imap_entry_id
  allowed_senders_raw: !input allowed_senders
  folder_filter_raw: !input folder_filter
  subject_filter_raw: !input subject_filter
  default_duplex: !input default_duplex
  one_sided_kw_raw: !input one_sided_filename_keywords
  two_sided_long_kw_raw: !input two_sided_long_filename_keywords
  booklet_fname_kw_raw: !input booklet_filename_keywords
  booklet_senders_raw: !input booklet_senders
  mark_as_seen: !input mark_as_seen

  # Normalised lists (lowercased, whitespace-trimmed, empty strings removed)
  _folder_list: >
    {{ folder_filter_raw | string | split(',')
       | map('trim') | reject('eq', '') | list }}
  _sender_list: >
    {{ allowed_senders_raw | string | lower | split(',')
       | map('trim') | reject('eq', '') | list }}
  _one_sided_fname_list: >
    {{ one_sided_kw_raw | string | lower | split(',')
       | map('trim') | reject('eq', '') | list }}
  _two_sided_long_fname_list: >
    {{ two_sided_long_kw_raw | string | lower | split(',')
       | map('trim') | reject('eq', '') | list }}
  _booklet_fname_list: >
    {{ booklet_fname_kw_raw | string | lower | split(',')
       | map('trim') | reject('eq', '') | list }}
  _booklet_sender_list: >
    {{ booklet_senders_raw | string | lower | split(',')
       | map('trim') | reject('eq', '') | list }}

  # Shortcuts from the event
  _folder: "{{ trigger.event.data.folder }}"
  _sender: "{{ trigger.event.data.sender | lower }}"
  _subject: "{{ trigger.event.data.subject | lower }}"
  _uid: "{{ trigger.event.data.uid | string }}"
  _parts: "{{ trigger.event.data.parts }}"

# ── Conditions ──────────────────────────────────────────────────────────────

condition:
  - alias: "Email folder is in the allowed list (or list is empty)"
    condition: template
    value_template: >
      {{ _folder_list | count == 0 or _folder in _folder_list }}

  - alias: "Sender is in the allowed list (or list is empty)"
    condition: template
    value_template: >
      {{ _sender_list | count == 0 or _sender in _sender_list }}

  - alias: "Subject contains the required filter text (or filter is empty)"
    condition: template
    value_template: >
      {{ subject_filter_raw | trim == ''
         or subject_filter_raw | lower in _subject }}

  - alias: "Email has at least one PDF attachment"
    condition: template
    value_template: >
      {{ _parts.values() | list
         | selectattr('content_type', 'equalto', 'application/pdf')
         | list | count > 0 }}

# ── Actions ─────────────────────────────────────────────────────────────────

action:
  - alias: "Print each PDF attachment"
    repeat:
      # parts is a dict {'1': {content_type, filename, …}, …}
      # dictsort gives [('1', {…}), ('2', {…}), …] ordered by key
      for_each: "{{ _parts | dictsort }}"
      sequence:
        - condition: template
          value_template: "{{ repeat.item[1].content_type == 'application/pdf' }}"

        # Compute per-attachment duplex/booklet settings from the PDF filename.
        - variables:
            _pdf_name: >
              {{ (repeat.item[1].filename
                  or repeat.item[1].get('file_name', '')
                  or ('attachment_' ~ repeat.item[0] ~ '.pdf')) | lower }}
            _pdf_is_booklet: >
              {{ (_booklet_fname_list | select('in', _pdf_name) | list | count > 0)
                 or (_sender in _booklet_sender_list) }}
            _pdf_duplex: >
              {% if _pdf_is_booklet %}
                two-sided-short-edge
              {% elif _one_sided_fname_list | select('in', _pdf_name) | list | count > 0 %}
                one-sided
              {% elif _two_sided_long_fname_list | select('in', _pdf_name) | list | count > 0 %}
                two-sided-long-edge
              {% else %}
                {{ default_duplex }}
              {% endif %}

        - action: print_bridge.process_imap_part
          data:
            entry_id: "{{ trigger.event.data.entry_id }}"
            uid: "{{ _uid }}"
            part_key: "{{ repeat.item[0] }}"
            filename: >
              {{ repeat.item[1].filename
                 or repeat.item[1].get('file_name')
                 or ('attachment_' ~ repeat.item[0] ~ '.pdf') }}
            duplex: "{{ _pdf_duplex }}"
            booklet: "{{ _pdf_is_booklet }}"

  - alias: "Mark email as seen (optional)"
    if:
      - condition: template
        value_template: "{{ mark_as_seen }}"
    then:
      - action: imap.seen
        data:
          entry_id: "{{ imap_entry_id }}"
          uid: "{{ _uid }}"

mode: queued
max: 10
