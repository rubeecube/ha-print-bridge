blueprint:
  name: "Print Bridge — Email to Printer"
  description: >
    Print PDF email attachments directly from your mailbox.

    Triggers on every new email from the selected IMAP account.
    Optionally filters by sender, subject, or attachment name.
    Prints with the configured duplex / booklet setting.

  domain: automation
  author: rubeecube
  source_url: https://raw.githubusercontent.com/rubeecube/ha-print-bridge/main/blueprints/automation/print_bridge/print_from_email.yaml

  input:

    # ── IMAP account ──────────────────────────────────────────────────────

    imap_entry_id:
      name: IMAP Account
      description: >
        The IMAP integration entry to monitor.
        Set up the HA IMAP integration first (Settings → Integrations → IMAP).
      selector:
        config_entry:
          integration: imap

    # ── Filters (all optional) ────────────────────────────────────────────

    allowed_sender:
      name: Sender (optional)
      description: >
        Only print emails from this address (case-insensitive).
        Leave empty to accept any sender.

        Example: `print@example.com`
      default: ""
      selector:
        text:

    subject_filter:
      name: Subject contains (optional)
      description: >
        Only print emails whose subject contains this text (case-insensitive).
        Leave empty to accept any subject.

        Example: `PRINT`
      default: ""
      selector:
        text:

    attachment_filter:
      name: Attachment name contains (optional)
      description: >
        Only print PDF attachments whose filename contains this text
        (case-insensitive). Leave empty to print all PDF attachments.

        Example: `invoice`
      default: ""
      selector:
        text:

    # ── Print settings ────────────────────────────────────────────────────

    booklet:
      name: Booklet printing
      description: >
        Reorder pages for saddle-stitch booklet printing
        (forces two-sided short-edge). Overrides the Duplex setting below.
      default: false
      selector:
        boolean:

    duplex:
      name: Duplex
      description: >
        How to print each page. Ignored when Booklet is enabled.
      default: "two-sided-long-edge"
      selector:
        select:
          options:
            - label: "One-sided"
              value: "one-sided"
            - label: "Two-sided — portrait (long edge)"
              value: "two-sided-long-edge"
            - label: "Two-sided — landscape / short edge"
              value: "two-sided-short-edge"

    # ── Post-processing ───────────────────────────────────────────────────

    mark_as_seen:
      name: Mark email as seen
      description: Mark the email as read after printing.
      default: true
      selector:
        boolean:

# ── Trigger ────────────────────────────────────────────────────────────────

trigger:
  - trigger: event
    event_type: imap_content
    event_data:
      entry_id: !input imap_entry_id

# ── Variables ──────────────────────────────────────────────────────────────

variables:
  imap_entry_id: !input imap_entry_id
  allowed_sender: !input allowed_sender
  subject_filter: !input subject_filter
  attachment_filter: !input attachment_filter
  booklet: !input booklet
  duplex: !input duplex
  mark_as_seen: !input mark_as_seen

  _sender: "{{ trigger.event.data.sender | lower }}"
  _subject: "{{ trigger.event.data.subject | lower }}"
  _uid: "{{ trigger.event.data.uid | string }}"
  _parts: "{{ trigger.event.data.parts }}"

  _effective_duplex: "{{ 'two-sided-short-edge' if booklet else duplex }}"

# ── Conditions ──────────────────────────────────────────────────────────────

condition:
  - alias: "Sender matches (or filter is empty)"
    condition: template
    value_template: >
      {{ allowed_sender | trim == ''
         or allowed_sender | lower | trim in _sender }}

  - alias: "Subject matches (or filter is empty)"
    condition: template
    value_template: >
      {{ subject_filter | trim == ''
         or subject_filter | lower | trim in _subject }}

  - alias: "Email has at least one PDF attachment"
    condition: template
    value_template: >
      {% set ns = namespace(has_pdf=false) %}
      {% for part in _parts.values() %}
        {% if (part.content_type | string | lower).split(';')[0] | trim == 'application/pdf' %}
          {% set ns.has_pdf = true %}
        {% endif %}
      {% endfor %}
      {{ ns.has_pdf }}

# ── Actions ─────────────────────────────────────────────────────────────────

action:
  - alias: "Print each matching PDF attachment"
    repeat:
      for_each: "{{ _parts | dictsort }}"
      sequence:
        - condition: template
          value_template: >
            {{ (repeat.item[1].content_type | string | lower).split(';')[0] | trim
               == 'application/pdf' }}

        - variables:
            _filename: >
              {{ repeat.item[1].filename
                 or repeat.item[1].get('file_name', '')
                 or ('attachment_' ~ repeat.item[0] ~ '.pdf') }}

        - action: print_bridge.process_imap_part
          data:
            entry_id: "{{ trigger.event.data.entry_id }}"
            uid: "{{ _uid }}"
            part_key: "{{ repeat.item[0] }}"
            filename: "{{ _filename }}"
            duplex: "{{ _effective_duplex }}"
            booklet: "{{ booklet }}"
            attachment_filter: "{{ attachment_filter }}"
            sender: "{{ trigger.event.data.sender }}"
            mail_subject: "{{ trigger.event.data.subject }}"
            mail_text: "{{ trigger.event.data.text | default('') }}"

  - alias: "Mark email as seen (optional)"
    if:
      - condition: template
        value_template: "{{ mark_as_seen }}"
    then:
      - action: imap.seen
        data:
          entry: "{{ imap_entry_id }}"
          uid: "{{ _uid }}"

mode: queued
max: 10
