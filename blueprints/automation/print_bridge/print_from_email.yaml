blueprint:
  name: "Print Bridge — Email to Printer"
  description: >
    Print common email attachments directly from your mailbox.

    Triggers on every new email from the selected IMAP account.
    Optionally filters by sender, subject, or attachment name.
    Prints with the configured duplex / booklet setting.

  domain: automation
  author: rubeecube
  source_url: https://raw.githubusercontent.com/rubeecube/ha-print-bridge/main/blueprints/automation/print_bridge/print_from_email.yaml

  input:

    # ── IMAP account ──────────────────────────────────────────────────────

    imap_entry_id:
      name: IMAP Account
      description: >
        The IMAP integration entry to monitor.
        Set up the HA IMAP integration first (Settings → Integrations → IMAP).
      selector:
        config_entry:
          integration: imap

    # ── Filters (all optional) ────────────────────────────────────────────

    allowed_sender:
      name: Sender (optional)
      description: >
        Only print emails from this address (case-insensitive).
        Leave empty to accept any sender.

        Example: `print@example.com`
      default: ""
      selector:
        text:

    subject_filter:
      name: Subject contains (optional)
      description: >
        Only print emails whose subject contains this text (case-insensitive).
        Leave empty to accept any subject.

        Example: `PRINT`
      default: ""
      selector:
        text:

    attachment_filter:
      name: Attachment name contains (optional)
      description: >
        Only print supported attachments whose filename contains this text
        (case-insensitive). Leave empty to print all printable attachments.

        Example: `invoice`
      default: ""
      selector:
        text:

    attachment_ignore_filter:
      name: Ignore attachment names containing (optional)
      description: >
        Skip supported attachments whose filename contains this text
        (case-insensitive). Separate multiple values with commas or semicolons.

        Example: `draft, sample`
      default: ""
      selector:
        text:

    allowed_extensions:
      name: Only print extensions (optional)
      description: >
        Only print supported attachments with these extensions. Separate values
        with spaces, commas, or semicolons. Dots are optional.

        Example: `pdf docx jpg`
      default: ""
      selector:
        text:

    ignored_extensions:
      name: Ignore extensions (optional)
      description: >
        Skip supported attachments with these extensions. Separate values with
        spaces, commas, or semicolons. Dots are optional.

        Example: `png, tiff`
      default: ""
      selector:
        text:

    # ── Print settings ────────────────────────────────────────────────────

    booklet:
      name: Booklet printing
      description: >
        Reorder pages for saddle-stitch booklet printing
        (forces two-sided short-edge). Overrides the Duplex setting below.
      default: false
      selector:
        boolean:

    duplex:
      name: Duplex
      description: >
        How to print each page. Ignored when Booklet is enabled.
      default: "two-sided-long-edge"
      selector:
        select:
          options:
            - label: "One-sided"
              value: "one-sided"
            - label: "Two-sided — portrait (long edge)"
              value: "two-sided-long-edge"
            - label: "Two-sided — landscape / short edge"
              value: "two-sided-short-edge"

    # ── Post-processing ───────────────────────────────────────────────────

    mark_as_seen:
      name: Mark email as seen
      description: Mark the email as read after printing.
      default: true
      selector:
        boolean:

# ── Trigger ────────────────────────────────────────────────────────────────

trigger:
  - trigger: event
    event_type: imap_content
    event_data:
      entry_id: !input imap_entry_id

# ── Variables ──────────────────────────────────────────────────────────────

variables:
  imap_entry_id: !input imap_entry_id
  allowed_sender: !input allowed_sender
  subject_filter: !input subject_filter
  attachment_filter: !input attachment_filter
  attachment_ignore_filter: !input attachment_ignore_filter
  allowed_extensions: !input allowed_extensions
  ignored_extensions: !input ignored_extensions
  booklet: !input booklet
  duplex: !input duplex
  mark_as_seen: !input mark_as_seen

  _sender: "{{ trigger.event.data.sender | lower }}"
  _subject: "{{ trigger.event.data.subject | lower }}"
  _mail_text: "{{ trigger.event.data.text | default('') | lower }}"
  _uid: "{{ trigger.event.data.uid | string }}"
  _parts: "{{ trigger.event.data.parts }}"

  _effective_duplex: "{{ 'two-sided-short-edge' if booklet else duplex }}"
  _mail_config_allowed: >
    {{ allowed_sender | trim != ''
       and allowed_sender | lower | trim in _sender }}
  _mail_config_requested: >
    {{ _mail_config_allowed
       and (
         '[pb config' in _subject
         or '[print-bridge config' in _subject
         or 'pb: config' in _mail_text
         or 'print-bridge: config' in _mail_text
         or 'command=config' in _subject
         or 'command=config' in _mail_text
         or 'config=true' in _subject
         or 'config=true' in _mail_text
       ) }}

# ── Conditions ──────────────────────────────────────────────────────────────

condition:
  - alias: "Sender matches (or filter is empty)"
    condition: template
    value_template: >
      {{ allowed_sender | trim == ''
         or allowed_sender | lower | trim in _sender }}

  - alias: "Subject matches (or filter is empty)"
    condition: template
    value_template: >
      {{ subject_filter | trim == ''
         or subject_filter | lower | trim in _subject }}

  - alias: "Email has at least one printable attachment"
    condition: template
    value_template: >
      {% set printable_mimes = [
        'application/pdf',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        'application/vnd.ms-word.document.macroenabled.12',
        'application/vnd.oasis.opendocument.text',
        'application/rtf',
        'text/rtf',
        'text/plain',
        'text/html',
        'text/markdown',
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        'application/vnd.ms-excel.sheet.macroenabled.12',
        'application/vnd.ms-excel',
        'application/vnd.oasis.opendocument.spreadsheet',
        'text/csv',
        'text/tab-separated-values',
        'application/vnd.openxmlformats-officedocument.presentationml.presentation',
        'application/vnd.oasis.opendocument.presentation',
        'image/jpeg',
        'image/png',
        'image/tiff',
        'image/bmp',
        'image/webp'
      ] %}
      {% set printable_exts = [
        '.pdf', '.docx', '.docm', '.odt', '.rtf', '.txt', '.html', '.htm', '.md',
        '.xlsx', '.xlsm', '.xls', '.ods', '.csv', '.tsv', '.pptx', '.odp',
        '.jpg', '.jpeg', '.png', '.tif', '.tiff', '.bmp', '.webp',
        '.doc', '.ppt'
      ] %}
      {% set allowed_ext_text = ' ' ~ (allowed_extensions | lower | replace(',', ' ') | replace(';', ' ') | replace('\n', ' ')) ~ ' ' %}
      {% set ignored_ext_text = ' ' ~ (ignored_extensions | lower | replace(',', ' ') | replace(';', ' ') | replace('\n', ' ')) ~ ' ' %}
      {% set ns = namespace(has_printable=false) %}
      {% for part in _parts.values() %}
        {% set ctype = (part.content_type | string | lower).split(';')[0] | trim %}
        {% set filename = (part.filename or part.get('file_name', '') or '') | lower %}
        {% set filename_matches = attachment_filter | trim == ''
           or attachment_filter | lower | trim in filename %}
        {% set ignored_name = namespace(value=false) %}
        {% for token in (attachment_ignore_filter | lower | replace(';', ',') | replace('\n', ',')).split(',') %}
          {% if token | trim != '' and token | trim in filename %}
            {% set ignored_name.value = true %}
          {% endif %}
        {% endfor %}
        {% set ext_match = namespace(value='') %}
        {% for ext in printable_exts %}
          {% if filename.endswith(ext) %}
            {% set ext_match.value = ext %}
          {% endif %}
        {% endfor %}
        {% set bare_ext = ext_match.value[1:] if ext_match.value.startswith('.') else ext_match.value %}
        {% set ext_ignored = ignored_ext_text | trim != ''
           and ext_match.value != ''
           and ((' ' ~ ext_match.value ~ ' ') in ignored_ext_text
                or (' ' ~ bare_ext ~ ' ') in ignored_ext_text) %}
        {% set ext_allowed = allowed_ext_text | trim == ''
           or (ext_match.value != ''
               and ((' ' ~ ext_match.value ~ ' ') in allowed_ext_text
                    or (' ' ~ bare_ext ~ ' ') in allowed_ext_text)) %}
        {% if filename and filename_matches and not ignored_name.value and not ext_ignored and ext_allowed %}
          {% if ctype in printable_mimes %}
            {% set ns.has_printable = true %}
          {% else %}
            {% for ext in printable_exts %}
              {% if filename.endswith(ext) %}
                {% set ns.has_printable = true %}
              {% endif %}
            {% endfor %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.has_printable or _mail_config_requested }}

# ── Actions ─────────────────────────────────────────────────────────────────

action:
  - alias: "Print matching printable attachments as one job"
    action: print_bridge.process_imap_message
    data:
      entry_id: "{{ trigger.event.data.entry_id }}"
      uid: "{{ _uid }}"
      parts: "{{ _parts }}"
      duplex: "{{ _effective_duplex }}"
      booklet: "{{ booklet }}"
      attachment_filter: "{{ attachment_filter }}"
      attachment_ignore_filter: "{{ attachment_ignore_filter }}"
      allowed_extensions: "{{ allowed_extensions }}"
      ignored_extensions: "{{ ignored_extensions }}"
      sender: "{{ trigger.event.data.sender }}"
      mail_subject: "{{ trigger.event.data.subject }}"
      mail_text: "{{ trigger.event.data.text | default('') }}"
      mail_config_allowed: "{{ _mail_config_allowed }}"
    response_variable: print_bridge_result

  - alias: "Mark email as seen (optional)"
    if:
      - condition: template
        value_template: >
          {{ mark_as_seen
             and (print_bridge_result.merged_attachment_count | default(0) | int > 0) }}
    then:
      - action: imap.seen
        data:
          entry: "{{ imap_entry_id }}"
          uid: "{{ _uid }}"

mode: queued
max: 10
