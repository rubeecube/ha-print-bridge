# Print Bridge — Audit Dashboard View
#
# How to add this view to your Home Assistant dashboard:
#
#   1. Open your dashboard → Edit → Add View → Manual Configuration (YAML)
#   2. Paste the CONTENTS of this file as the view YAML.
#   OR
#   1. In configuration.yaml add the lovelace section and reference this file.
#
# Replace PRINTER_NAME with the CUPS queue name used during setup
# (e.g. Canon_MG3600_series).  Entity IDs follow the pattern:
#   sensor.print_bridge_{slug}_job_log
#   sensor.print_bridge_{slug}_last_print_job
#   binary_sensor.print_bridge_{slug}_printer_online
#
# The entity slugs are derived from the printer name — open Developer Tools →
# States and search "print_bridge" to find the exact IDs for your setup.
#
# ─────────────────────────────────────────────────────────────────────────────

title: Print Audit
path: print-bridge-audit
icon: mdi:printer-eye

cards:

  # ── Status row ─────────────────────────────────────────────────────────────
  - type: horizontal-stack
    cards:
      - type: entity
        entity: binary_sensor.print_bridge_PRINTER_NAME_printer_online
        name: Printer Online
        icon: mdi:printer-check
        state_color: true

      - type: entity
        entity: sensor.print_bridge_PRINTER_NAME_print_queue_depth
        name: Queue Depth
        icon: mdi:file-multiple

      - type: entity
        entity: sensor.print_bridge_PRINTER_NAME_scheduled_queue
        name: Scheduled Queue
        icon: mdi:clock-outline
        state_color: true

      - type: entity
        entity: sensor.print_bridge_PRINTER_NAME_job_log
        name: Jobs Sent
        icon: mdi:counter

      - type: entity
        entity: sensor.print_bridge_PRINTER_NAME_last_print_job
        name: Last Job
        icon: mdi:file-check

  # ── Logbook ────────────────────────────────────────────────────────────────
  - type: logbook
    title: Print Event Log
    hours_to_show: 168    # 7 days
    entities:
      - sensor.print_bridge_PRINTER_NAME_job_log
      - sensor.print_bridge_PRINTER_NAME_last_print_job

  # ── Recent jobs table (Markdown) ───────────────────────────────────────────
  - type: markdown
    title: Recent Print Jobs (last 50)
    content: |
      {% set jobs = state_attr('sensor.print_bridge_PRINTER_NAME_job_log', 'jobs') %}
      {% if jobs is none or jobs | count == 0 %}
      *No print jobs recorded yet.*
      {% else %}
      | # | Time | File | Status | Sender | Duplex | Retry |
      |---|------|------|:------:|--------|--------|:-----:|
      {% for j in jobs %}
      | {{ j.index }} | {{ j.timestamp | as_datetime | as_local | strftime('%d/%m %H:%M') }} | `{{ j.filename }}` | {{ '✅' if j.success else '❌' }} | {{ j.sender or '—' }} | {{ j.duplex or '—' }} | {{ '🔄' if j.can_retry else '—' }} |
      {% endfor %}

      *🔄 = retryable — use index with `print_bridge.retry_job`*
      {% endif %}

  # ── Statistics graph ───────────────────────────────────────────────────────
  - type: statistics-graph
    title: Print Activity
    entities:
      - entity: sensor.print_bridge_PRINTER_NAME_job_log
        name: Jobs Sent
    period:
      calendar:
        period: day
    stat_types:
      - max
    days_to_show: 30

  # ── Filter preview ─────────────────────────────────────────────────────────
  - type: entity
    entity: sensor.print_bridge_PRINTER_NAME_filter_preview
    name: Matching Emails (last check)
    icon: mdi:email-search

  - type: markdown
    title: Filter Preview — Matching Emails
    content: |
      {% set preview = state_attr('sensor.print_bridge_PRINTER_NAME_filter_preview', 'emails') %}
      {% set checked = state_attr('sensor.print_bridge_PRINTER_NAME_filter_preview', 'checked_at') %}
      {% if preview is none or preview | count == 0 %}
      *No check run yet. Press **Check Filter** to scan the mailbox.*
      {% else %}
      **Last checked:** {{ checked }}  ·  **Account:** {{ state_attr('sensor.print_bridge_PRINTER_NAME_filter_preview', 'imap_account') }}

      **{{ state_attr('sensor.print_bridge_PRINTER_NAME_filter_preview', 'total_found') }}** emails scanned  ·  **{{ state_attr('sensor.print_bridge_PRINTER_NAME_filter_preview', 'matching_filter') }}** match filter  ·  **{{ state_attr('sensor.print_bridge_PRINTER_NAME_filter_preview', 'with_pdf') }}** have a PDF

      | Date | Subject | From | Folder | Match | PDF |
      |------|---------|------|--------|:-----:|:---:|
      {% for e in preview %}
      | {{ e.date | truncate(16, true, '') }} | {{ e.subject | truncate(35) }} | {{ e.sender | truncate(25) }} | {{ e.folder }} | {{ '✅' if e.matches_filter else '⬜' }} | {{ '📄 ×' ~ e.pdf_count if e.has_pdf else '—' }} |
      {% endfor %}
      {% endif %}

  # ── Quick actions ──────────────────────────────────────────────────────────
  - type: entities
    title: Actions
    entities:
      - entity: button.print_bridge_PRINTER_NAME_print_queued_jobs_now
        name: Print Queued Jobs Now (bypass schedule)

      - entity: button.print_bridge_PRINTER_NAME_retry_last_failed_job
        name: Retry Last Failed Job

      - entity: button.print_bridge_PRINTER_NAME_check_filter
        name: Check Filter (scan mailbox)

      - entity: button.print_bridge_PRINTER_NAME_print_test_page
        name: Print Test Page

      - type: button
        name: Clear Print Queue
        icon: mdi:delete-sweep
        action_name: Clear
        tap_action:
          action: call-service
          service: print_bridge.clear_queue
