# Print Bridge — Management Dashboard
#
# SETUP (one-time):
#   1. Open any dashboard → Edit → Add View → YAML
#   2. Paste this entire file
#   3. Replace YOUR_SLUG with your printer's entity slug
#      (search "print_bridge" in Developer Tools → States to find it,
#       e.g. "canonmg3600series" or "testprinter")
#
# After setup you can also find entities at:
#   Settings → Devices & Services → Print Bridge → click the device
#
# ─────────────────────────────────────────────────────────────────────────────

title: Print Bridge
path: print-bridge
icon: mdi:printer-wireless

cards:

  # ── Dynamic status — no slug needed (auto-detects entities) ───────────────
  - type: markdown
    content: |
      {% set online = (states.binary_sensor | selectattr('entity_id', 'search', 'print_bridge.*printer_online') | list | first | default(none)) %}
      {% set last   = (states.sensor | selectattr('entity_id', 'search', 'print_bridge.*last_print_job') | list | first | default(none)) %}
      {% set jobs   = (states.sensor | selectattr('entity_id', 'search', 'print_bridge.*job_log') | list | first | default(none)) %}
      {% set queue  = (states.sensor | selectattr('entity_id', 'search', 'print_bridge.*print_queue_depth') | list | first | default(none)) %}
      {% set sched  = (states.sensor | selectattr('entity_id', 'search', 'print_bridge.*scheduled_queue') | list | first | default(none)) %}

      ## Print Bridge

      | Printer | Last Job | Queue | Scheduled | Total Jobs |
      |:-------:|:--------:|:-----:|:---------:|:----------:|
      | {{ '🟢 Online' if online and online.state == 'on' else ('🔴 Offline' if online else '❓ Unknown') }} | {{ ('✅ ' if last and last.state == 'success' else ('❌ ' if last else '')) ~ (last.state if last else '—') }} | {{ queue.state if queue else '—' }} | {{ sched.state if sched else '—' }} | {{ jobs.state if jobs else '—' }} |

  # ── Component configuration ───────────────────────────────────────────────
  - type: entities
    title: Configuration
    show_header_toggle: false
    entities:
      - switch.print_bridge_YOUR_SLUG_auto_print
      - select.print_bridge_YOUR_SLUG_imap_account
      - select.print_bridge_YOUR_SLUG_target_printer
      - select.print_bridge_YOUR_SLUG_default_duplex_mode
      - text.print_bridge_YOUR_SLUG_allowed_senders
      - text.print_bridge_YOUR_SLUG_folder_filter
      - text.print_bridge_YOUR_SLUG_booklet_patterns
      - type: section
        label: Files and mailbox cleanup
      - switch.print_bridge_YOUR_SLUG_delete_after_printing
      - text.print_bridge_YOUR_SLUG_queue_folder
      - select.print_bridge_YOUR_SLUG_email_action_after_print
      - text.print_bridge_YOUR_SLUG_email_archive_folder
      - type: section
        label: Notifications
      - switch.print_bridge_YOUR_SLUG_notify_on_failure
      - switch.print_bridge_YOUR_SLUG_notify_on_success
      - type: section
        label: Schedule
      - switch.print_bridge_YOUR_SLUG_print_schedule
      - text.print_bridge_YOUR_SLUG_schedule_start
      - text.print_bridge_YOUR_SLUG_schedule_end
      - text.print_bridge_YOUR_SLUG_schedule_days
      - text.print_bridge_YOUR_SLUG_schedule_template

  # ── Action grid ────────────────────────────────────────────────────────────
  - type: grid
    square: false
    columns: 2
    cards:
      - type: button
        name: Scan Mailbox
        icon: mdi:email-search
        entity: button.print_bridge_YOUR_SLUG_check_filter
        hold_action:
          action: none
        tap_action:
          action: toggle

      - type: button
        name: Print Test Page
        icon: mdi:printer-check
        entity: button.print_bridge_YOUR_SLUG_print_test_page
        tap_action:
          action: toggle

      - type: button
        name: Retry Last Failed
        icon: mdi:printer-alert
        entity: button.print_bridge_YOUR_SLUG_retry_last_failed_job
        tap_action:
          action: toggle

      - type: button
        name: Print Queued Jobs
        icon: mdi:printer-pos
        entity: button.print_bridge_YOUR_SLUG_print_queued_jobs_now
        tap_action:
          action: toggle

  # ── Blueprint install (no slug needed) ────────────────────────────────────
  - type: button
    name: Install Automation Blueprint
    icon: mdi:puzzle-plus
    tap_action:
      action: url
      url_path: "https://my.home-assistant.io/redirect/blueprint_import?blueprint_url=https%3A%2F%2Fraw.githubusercontent.com%2Frubeecube%2Fha-print-bridge%2Fmain%2Fblueprints%2Fautomation%2Fprint_bridge%2Fprint_from_email.yaml"

  # ── Mailbox scan results (auto-detected, no slug) ─────────────────────────
  - type: markdown
    title: Mailbox — Matching Emails
    content: |
      {% set s = (states.sensor | selectattr('entity_id', 'search', 'print_bridge.*filter_preview') | list | first | default(none)) %}
      {% if s is none %}
      *Integration not loaded yet.*
      {% else %}
      {% set preview = state_attr(s.entity_id, 'emails') %}
      {% set checked = state_attr(s.entity_id, 'checked_at') %}
      {% if preview is none or preview | count == 0 %}
      *No scan run yet. Press **Scan Mailbox** above to check your inbox.*
      {% else %}
      **Scanned:** {{ checked }}  ·  **Account:** {{ state_attr(s.entity_id, 'imap_account') }}
      **{{ state_attr(s.entity_id, 'total_found') }}** found  ·  **{{ state_attr(s.entity_id, 'matching_filter') }}** match filter  ·  **{{ state_attr(s.entity_id, 'with_pdf') }}** have PDF

      {% set printable = preview | selectattr('has_pdf') | selectattr('matches_filter') | list %}
      | UID | Subject | From | PDF |
      |-----|---------|------|:---:|
      {% for e in printable[:5] %}
      | `{{ e.uid }}` | {{ e.subject | truncate(36) }} | {{ e.sender | truncate(24) }} | 📄×{{ e.pdf_count }} |
      {% else %}
      | — | No emails with PDF found | | |
      {% endfor %}
      {% endif %}
      {% endif %}

  # ── One-press print buttons for the last 5 matching emails ───────────────
  - type: grid
    title: Last 5 Mail Prints
    square: false
    columns: 1
    cards:
      - type: button
        entity: button.print_bridge_YOUR_SLUG_print_email_1
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.print_bridge_YOUR_SLUG_print_email_1

      - type: button
        entity: button.print_bridge_YOUR_SLUG_print_email_2
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.print_bridge_YOUR_SLUG_print_email_2

      - type: button
        entity: button.print_bridge_YOUR_SLUG_print_email_3
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.print_bridge_YOUR_SLUG_print_email_3

      - type: button
        entity: button.print_bridge_YOUR_SLUG_print_email_4
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.print_bridge_YOUR_SLUG_print_email_4

      - type: button
        entity: button.print_bridge_YOUR_SLUG_print_email_5
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.print_bridge_YOUR_SLUG_print_email_5

  # ── Recent print jobs (auto-detected, no slug) ────────────────────────────
  - type: markdown
    title: Recent Print Jobs
    content: |
      {% set s = (states.sensor | selectattr('entity_id', 'search', 'print_bridge.*job_log') | list | first | default(none)) %}
      {% if s is none %}
      *No jobs recorded yet.*
      {% else %}
      {% set jobs = state_attr(s.entity_id, 'jobs') %}
      {% if jobs is none or jobs | count == 0 %}
      *No print jobs yet. Send a test email or press Print Test Page.*
      {% else %}
      | Time | File | Status | Sender | Retry |
      |------|------|:------:|--------|:-----:|
      {% for j in jobs[:10] %}
      | {{ j.timestamp | as_datetime | as_local | strftime('%d/%m %H:%M') }} | `{{ j.filename | truncate(25) }}` | {{ '✅' if j.success else '❌' }} | {{ j.sender or '—' }} | {{ ('`retry_job(idx=' ~ j.index ~ ')`') if j.can_retry else '—' }} |
      {% endfor %}
      {% endif %}
      {% endif %}

  # ── Quick actions (services) ───────────────────────────────────────────────
  - type: entities
    title: Management
    entities:
      - type: button
        name: Clear Print Queue
        icon: mdi:delete-sweep
        action_name: Clear
        tap_action:
          action: call-service
          service: print_bridge.clear_queue

      - type: weblink
        name: Open Integration Settings
        url: /config/integrations/integration/print_bridge
        icon: mdi:cog

      - type: weblink
        name: View Logbook (Print Bridge)
        url: /logbook?entity_id=sensor.print_bridge_YOUR_SLUG_job_log
        icon: mdi:history
