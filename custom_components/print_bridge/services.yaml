print_email:
  name: Print Email
  description: >-
    Print all PDF attachments from a specific email in your mailbox.
    Use the email's UID shown in the Filter Preview sensor or in the audit
    Lovelace view.  Perfect for on-demand printing from the dashboard.
  fields:
    uid:
      name: Email UID
      description: >-
        The IMAP UID of the email to print.  Find it in the
        sensor.print_bridge_*_filter_preview attributes (jobs[].uid) or in
        the Lovelace audit table.
      required: true
      selector:
        text:
    imap_entry_id:
      name: IMAP Entry ID
      description: >-
        The config entry ID of the IMAP integration that holds the email.
        Defaults to the selected IMAP Account entity, or the first configured
        IMAP account when nothing has been selected.
      required: false
      selector:
        text:
    duplex:
      name: Duplex Mode
      description: Override the default duplex mode for this job.
      required: false
      selector:
        select:
          options:
            - label: "One-sided"
              value: "one-sided"
            - label: "Two-sided — portrait (long edge)"
              value: "two-sided-long-edge"
            - label: "Two-sided — landscape (short edge)"
              value: "two-sided-short-edge"
    booklet:
      name: Booklet Mode
      description: Reorder pages for saddle-stitch booklet printing.
      required: false
      default: false
      selector:
        boolean:
    attachment_filter:
      name: Attachment Filter
      description: Optional filename substring; only matching PDF attachments print.
      required: false
      selector:
        text:
    copies:
      name: Copies
      description: Number of copies to request from the printer.
      required: false
      selector:
        number:
          min: 1
          max: 20
          mode: box
    orientation:
      name: Orientation
      description: Request portrait or landscape output. Booklet jobs always request landscape.
      required: false
      selector:
        select:
          options:
            - label: "Portrait"
              value: "portrait"
            - label: "Landscape"
              value: "landscape"
    media:
      name: Paper Size / Media
      description: IPP media keyword, such as iso_a4_210x297mm or na_letter_8.5x11in.
      required: false
      selector:
        text:

print_file:
  name: Print File
  description: >-
    Send a PDF file from the Home Assistant filesystem to the selected target
    printer.
  fields:
    file_path:
      name: File Path
      description: Absolute path to the PDF file on the Home Assistant filesystem.
      required: true
      example: /media/print_queue/document.pdf
      selector:
        text:
    duplex:
      name: Duplex Mode
      description: >-
        Override the default duplex mode for this job.
        Leave empty to use the value configured in the integration options.
      required: false
      selector:
        select:
          options:
            - label: "One-sided"
              value: "one-sided"
            - label: "Two-sided — portrait (long edge)"
              value: "two-sided-long-edge"
            - label: "Two-sided — landscape (short edge)"
              value: "two-sided-short-edge"
    booklet:
      name: Booklet Mode
      description: >-
        Reorder pages for saddle-stitch booklet printing.
        Overrides automatic booklet detection based on filename patterns.
      required: false
      default: false
      selector:
        boolean:
    copies:
      name: Copies
      description: Number of copies to request from the printer.
      required: false
      selector:
        number:
          min: 1
          max: 20
          mode: box
    orientation:
      name: Orientation
      description: Request portrait or landscape output. Booklet jobs always request landscape.
      required: false
      selector:
        select:
          options:
            - label: "Portrait"
              value: "portrait"
            - label: "Landscape"
              value: "landscape"
    media:
      name: Paper Size / Media
      description: IPP media keyword, such as iso_a4_210x297mm or na_letter_8.5x11in.
      required: false
      selector:
        text:

clear_queue:
  name: Clear Print Queue
  description: >-
    Delete all PDF files currently sitting in the selected target printer's
    configured print queue folder.

retry_job:
  name: Retry Print Job
  description: >-
    Re-fetch a PDF attachment from the IMAP server and reprint it.
    Works on any job in the history that was originally received via email.
    Use the job_log sensor attributes to find the job_index or uid.
  fields:
    job_index:
      name: Job Index
      description: >-
        Position in job history (0 = most recent). Defaults to the most
        recent failed job when neither job_index nor uid is provided.
      required: false
      selector:
        number:
          min: 0
          max: 49
          mode: box
    uid:
      name: IMAP UID
      description: >-
        The IMAP message UID of the job to retry.  Available as the 'uid'
        field in sensor.print_bridge_*_job_log attributes.
      required: false
      selector:
        text:
    duplex:
      name: Duplex Override
      description: Override the duplex mode for this retry (leave blank to reuse original).
      required: false
      selector:
        select:
          options:
            - label: "One-sided"
              value: "one-sided"
            - label: "Two-sided — portrait (long edge)"
              value: "two-sided-long-edge"
            - label: "Two-sided — landscape (short edge)"
              value: "two-sided-short-edge"
    booklet:
      name: Booklet Override
      description: Override booklet mode for this retry.
      required: false
      selector:
        boolean:

check_filter:
  name: Check Filter
  description: >-
    Connect to the configured IMAP account and list emails that match the current
    allowed-senders filter.  Results are returned as a service response and also
    update the sensor.print_bridge_*_filter_preview entity.
  fields:
    imap_entry_id:
      name: IMAP Entry ID
      description: >-
        Optional. The config entry ID of the IMAP integration to query.
        Defaults to the selected IMAP Account entity, or the first configured
        IMAP account when nothing has been selected.
      required: false
      selector:
        text:

check_printer_capabilities:
  name: Check Printer Capabilities
  description: >-
    Query the selected target printer with IPP Get-Printer-Attributes and show
    the document formats it accepts.  The same capability data is used to choose
    whether Print Bridge sends PDF directly or converts PDF to PWG Raster.

process_imap_part:
  name: Process IMAP Email Part
  description: >-
    Fetch a specific PDF attachment from an IMAP message and send it to the
    selected target printer.  Intended to be called from automations and blueprints after an
    imap_content event.  Allows per-job overrides for duplex and booklet mode.
  fields:
    entry_id:
      name: IMAP Entry ID
      description: >-
        The entry_id of the IMAP config entry that received the email.
        Available as trigger.event.data.entry_id in automations.
      required: true
      selector:
        text:
    uid:
      name: Email UID
      description: The IMAP UID of the message (trigger.event.data.uid).
      required: true
      selector:
        text:
    part_key:
      name: Part Key
      description: >-
        The key of the part to fetch (from trigger.event.data.parts).
        e.g. "1" or "0,1".
      required: true
      selector:
        text:
    filename:
      name: Filename
      description: Display name for the print job. Defaults to the attachment filename.
      required: false
      selector:
        text:
    duplex:
      name: Duplex Mode
      description: Override the integration's default duplex mode for this job.
      required: false
      selector:
        select:
          options:
            - label: "One-sided"
              value: "one-sided"
            - label: "Two-sided — portrait (long edge)"
              value: "two-sided-long-edge"
            - label: "Two-sided — landscape (short edge)"
              value: "two-sided-short-edge"
    booklet:
      name: Booklet Mode
      description: >-
        Reorder pages for saddle-stitch booklet printing.
        Overrides automatic booklet detection from filename patterns.
      required: false
      default: false
      selector:
        boolean:
    attachment_filter:
      name: Attachment Filter
      description: Optional filename substring; only matching PDF attachments print.
      required: false
      selector:
        text:
    copies:
      name: Copies
      description: Number of copies to request from the printer.
      required: false
      selector:
        number:
          min: 1
          max: 20
          mode: box
    orientation:
      name: Orientation
      description: Request portrait or landscape output. Booklet jobs always request landscape.
      required: false
      selector:
        select:
          options:
            - label: "Portrait"
              value: "portrait"
            - label: "Landscape"
              value: "landscape"
    media:
      name: Paper Size / Media
      description: IPP media keyword, such as iso_a4_210x297mm or na_letter_8.5x11in.
      required: false
      selector:
        text:
    sender:
      name: Sender
      description: Original email sender; used for optional status replies.
      required: false
      selector:
        text:
    mail_subject:
      name: Mail Subject
      description: Original email subject; used for mail print parameters and reply subject.
      required: false
      selector:
        text:
    mail_text:
      name: Mail Text
      description: Original plain-text email body; used for mail print parameters.
      required: false
      selector:
        text:
